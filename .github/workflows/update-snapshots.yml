name: Update Snapshots

on:
  schedule:
    - cron: "0 15 * * *"  # 매일 KST 00:00 (UTC 15:00)
  workflow_dispatch:       # 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: node server.js &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000/api/health --timeout 10000

      - name: Collect snapshots (최근 3년)
        run: |
          mkdir -p snapshots
          CURRENT_YEAR=$(date -d '+9 hours' +%Y)
          for i in 0 1 2; do
            YEAR=$((CURRENT_YEAR - i))
            echo "수집 중: ${YEAR}년"
            curl -sf --max-time 180 "http://localhost:3000/api/dashboard?year=${YEAR}" \
              -o "snapshots/dashboard-${YEAR}.json"
            echo "${YEAR}년 완료"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --cached --quiet && echo "변경 없음" || \
            git commit -m "snapshots: $(date -d '+9 hours' +'%Y-%m-%d') 자동 업데이트"
          git push
